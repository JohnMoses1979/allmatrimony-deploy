services:
  mysql:
    image: mysql:8.0
    container_name: all_matrimony_mysql
    restart: always
    env_file:
      - backend.env
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - all_matrimony_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pmatri123"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./all/BACKEND
      dockerfile: Dockerfile
    container_name: all_matrimony_backend
    restart: always
    env_file:
      - backend.env
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8090:8080"
    volumes:
      - ./uploads:/app/uploads
    networks:
      - all_matrimony_net

  frontend:
    build:
      context: ./all
      dockerfile: Dockerfile
      args:
        EXPO_PUBLIC_API_BASE_URL: http://13.206.220.74:8090
    container_name: all_matrimony_frontend
    restart: always
    env_file:
      - frontend.env
    depends_on:
      - backend
    ports:
      - "8081:80"
    networks:
      - all_matrimony_net

volumes:
  mysql_data:

networks:
  all_matrimony_net:
    driver: bridge
