name: Deploy All Matrimony

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.EC2_SSH_KEY_B64 }}" | tr -d '\r\n' | base64 -d > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keygen -y -f ~/.ssh/ec2_key > /tmp/ec2_key.pub
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts
          echo "SSH key decoded and verified successfully"

      - name: Test SSH connection
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/ec2_key \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=no \
            -o BatchMode=yes \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "echo SSH connection successful && hostname && whoami"

      - name: Sync project files to EC2
        shell: bash
        run: |
          set -euo pipefail
          rsync -az --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "backend.env" \
            --exclude "frontend.env" \
            --exclude ".env" \
            --exclude "*.env" \
            --exclude "all/.env" \
            --exclude "uploads/" \
            --exclude "node_modules/" \
            --exclude "all/node_modules/" \
            --exclude "target/" \
            --exclude "all/BACKEND/target/" \
            --exclude "all/eas-build.log" \
            -e "ssh -i ~/.ssh/ec2_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=no" \
            ./ "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/allmatrimony-deploy/"

      - name: Rebuild and restart Docker containers
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/ec2_key \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=no \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" << 'EOF'
              set -e
              cd ~/allmatrimony-deploy
              sudo docker compose up -d --build mysql backend frontend
              sudo docker image prune -f
              sudo docker ps
          EOF
